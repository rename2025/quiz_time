version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: quiz_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-quizdb}
      POSTGRES_USER: ${DB_USER:-quizuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-quizpass123}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    ports:
      - "5432:5432"
    networks:
      - quiz_network
    healthcheck:
      test: ["CMD-SHELL", "pg_is ready -U ${DB_USER:-quizuser}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: quiz_redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redispass123}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - quiz_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  web:
    build: ./backend
    container_name: quiz_web
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collect static --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --threads 2 --timeout 120"
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - ./backend:/app
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - DB_HOST=postgres
      - DB_NAME=${DB_NAME:-quizdb}
      - DB_USER=${DB_USER:-quizuser}
      - DB_PASSWORD=${DB_PASSWORD:-quizpass123}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redispass123}
      - SECRET_KEY=${SECRET_KEY}
      - DEBUG=${DEBUG:-0}
      - EMAIL_HOST=${EMAIL_HOST}
      - EMAIL_PORT=${EMAIL_PORT}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD}
      - SENTRY_DSN=${SENTRY_DSN}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - quiz_network
    expose:
      - 8000
    restart: unless-stopped

  celery_worker:
    build: ./backend
    container_name: quiz_celery_worker
    command: celery -A config worker --loglevel=info --concurrency=2
    volumes:
      - ./backend:/app
      - media_volume:/app/media
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - DB_HOST=postgres
      - DB_NAME=${DB_NAME:-quizdb}
      - DB_USER=${DB_USER:-quizuser}
      - DB_PASSWORD=${DB_PASSWORD:-quizpass123}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redispass123}
      - SECRET_KEY=${SECRET_KEY}
    depends_on:
      - postgres
      - redis
      - web
    networks:
      - quiz_network
    restart: unless-stopped

  celery_beat:
    build: ./backend
    container_name: quiz_celery_beat
    command: celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./backend:/app
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - DB_HOST=postgres
      - DB_NAME=${DB_NAME:-quizdb}
      - DB_USER=${DB_USER:-quizuser}
      - DB_PASSWORD=${DB_PASSWORD:-quizpass123}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redispass123}
      - SECRET_KEY=${SECRET_KEY}
    depends_on:
      - postgres
      - redis
      - web
    networks:
      - quiz_network
    restart: unless-stopped

  nginx:
    image: nginx:latest
    container_name: quiz_nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - static_volume:/static
      - media_volume:/media
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - web
    networks:
      - quiz_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:

networks:
  quiz_network:
    driver: bridge